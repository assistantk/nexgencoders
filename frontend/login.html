<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elite Satellite Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 0.5rem;
            font-size: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-card p {
            color: var(--text-dim);
            margin-bottom: 2.5rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
        }
        .login-btn {
            width: 100%;
            margin-top: 1rem;
        }
        .auth-footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="login-container">
        <div class="login-card">
            <i data-lucide="shield-check" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 1.5rem;"></i>
            <h2>Welcome Back</h2>
            <p>Secure access to Satellite Intelligence</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="primary-btn login-btn glow-on-hover">Sign In</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="#">Request Access</a>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            // Simple simulation of login success
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
